<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nail the Polish</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FDF6F0;
    --text: #2D2226;
    --text-light: #8A7178;
    --accent: #C4536A;
    --accent-light: #F2D0D5;
    --card: #FFFFFF;
    --border: #E8DDD5;
    --shadow: 0 4px 24px rgba(45, 34, 38, 0.08);
    --shadow-lg: 0 12px 48px rgba(45, 34, 38, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: radial-gradient(circle at 20% 30%, rgba(196, 83, 106, 0.04) 0%, transparent 50%),
                      radial-gradient(circle at 80% 70%, rgba(196, 83, 106, 0.03) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.8s ease;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes popIn {
    0% { transform: scale(0); opacity: 0; }
    70% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }

  .logo { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .logo-icon { width: 36px; height: 36px; }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.6rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  h1 em { color: var(--accent); font-style: italic; }

  .subtitle {
    color: var(--text-light);
    font-size: 0.95rem;
    margin-top: 8px;
    font-weight: 300;
    letter-spacing: 0.02em;
  }

  /* Upload Area */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 20px;
    padding: 56px 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    background: var(--card);
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.8s ease 0.15s both;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: #FFF9FA;
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }
  .upload-zone.has-image {
    padding: 0;
    border-style: solid;
    border-color: var(--border);
    cursor: default;
  }
  .upload-zone.has-image:hover {
    transform: none;
    box-shadow: none;
  }
  .upload-icon { width: 56px; height: 56px; margin: 0 auto 16px; opacity: 0.7; }
  .upload-zone h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 400;
    margin-bottom: 6px;
  }
  .upload-zone p { color: var(--text-light); font-size: 0.85rem; font-weight: 300; }
  .upload-zone input { display: none; }
  .upload-prompt { transition: opacity 0.3s; }

  /* Image preview as canvas for picking */
  .preview-container {
    display: none;
    position: relative;
  }
  .preview-container canvas {
    display: block;
    width: 100%;
    border-radius: 18px;
    cursor: crosshair;
  }
  .preview-container canvas.default-cursor {
    cursor: default;
  }

  /* Toolbar over image */
  .image-toolbar {
    position: absolute;
    top: 12px;
    right: 12px;
    display: flex;
    gap: 6px;
    z-index: 5;
  }
  .toolbar-btn {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 100px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    color: var(--text);
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .toolbar-btn:hover {
    background: #fff;
    box-shadow: var(--shadow);
  }
  .toolbar-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .toolbar-btn svg { width: 14px; height: 14px; }

  /* Dropper hint banner */
  .dropper-hint {
    display: none;
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(45, 34, 38, 0.82);
    backdrop-filter: blur(8px);
    color: #fff;
    padding: 8px 18px;
    border-radius: 100px;
    font-size: 0.78rem;
    font-weight: 400;
    z-index: 5;
    pointer-events: none;
    animation: fadeUp 0.3s ease;
    white-space: nowrap;
  }
  .dropper-hint.visible { display: block; }

  /* Magnifier loupe */
  .loupe {
    display: none;
    position: absolute;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: 3px solid #fff;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    pointer-events: none;
    z-index: 10;
    overflow: hidden;
    image-rendering: pixelated;
  }
  .loupe canvas {
    width: 100%;
    height: 100%;
    border-radius: 50%;
  }
  .loupe-crosshair {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 12px; height: 12px;
    border: 2px solid rgba(255,255,255,0.9);
    border-radius: 50%;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.3);
  }
  .loupe-color {
    position: absolute;
    bottom: -28px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(45, 34, 38, 0.82);
    color: #fff;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 0.65rem;
    font-weight: 500;
    white-space: nowrap;
  }

  /* Loading */
  .loading-section {
    display: none;
    text-align: center;
    padding: 48px 0;
    animation: fadeUp 0.5s ease;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-section p {
    color: var(--text-light);
    font-size: 0.9rem;
    font-style: italic;
    font-family: 'Playfair Display', serif;
  }

  /* Colors Extracted */
  .extracted-section {
    display: none;
    margin-top: 32px;
    animation: fadeUp 0.6s ease;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .section-label {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-light);
  }

  .clear-colors-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--text-light);
    background: none;
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .clear-colors-btn:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  .color-chips {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 36px;
  }
  .color-chip {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 3px solid #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
  }
  .color-chip.picked {
    animation: popIn 0.35s ease both;
  }
  .color-chip:hover {
    transform: scale(1.15);
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }
  .color-chip.active {
    border-color: var(--accent);
    transform: scale(1.15);
    box-shadow: 0 4px 16px rgba(196, 83, 106, 0.3);
  }
  .color-chip .chip-remove {
    position: absolute;
    top: -6px; right: -6px;
    width: 18px; height: 18px;
    background: var(--text);
    color: #fff;
    border-radius: 50%;
    font-size: 11px;
    line-height: 18px;
    text-align: center;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .color-chip:hover .chip-remove { opacity: 1; }
  .color-chip .hex-tip {
    position: absolute;
    bottom: -24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.65rem;
    color: var(--text-light);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.2s;
    font-weight: 500;
  }
  .color-chip:hover .hex-tip,
  .color-chip.active .hex-tip { opacity: 1; }

  /* Results */
  .results-section {
    display: none;
    animation: fadeUp 0.6s ease;
  }
  .polish-grid { display: grid; gap: 14px; }
  .polish-card {
    display: flex;
    align-items: center;
    gap: 18px;
    background: var(--card);
    border-radius: 16px;
    padding: 18px 20px;
    border: 1px solid var(--border);
    transition: all 0.25s;
    animation: scaleIn 0.4s ease both;
  }
  .polish-card:nth-child(1) { animation-delay: 0.05s; }
  .polish-card:nth-child(2) { animation-delay: 0.1s; }
  .polish-card:nth-child(3) { animation-delay: 0.15s; }
  .polish-card:nth-child(4) { animation-delay: 0.2s; }
  .polish-card:nth-child(5) { animation-delay: 0.25s; }
  .polish-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow);
    border-color: transparent;
  }
  .polish-swatch {
    width: 52px; height: 52px;
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
    box-shadow: inset 0 -4px 8px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.08);
  }
  .polish-swatch::after {
    content: '';
    position: absolute;
    top: 6px; left: 10px;
    width: 16px; height: 10px;
    background: rgba(255,255,255,0.35);
    border-radius: 50%;
    transform: rotate(-30deg);
  }
  .polish-info { flex: 1; min-width: 0; }
  .polish-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 600;
    margin-bottom: 2px;
    color: var(--text);
  }
  .polish-brand {
    font-size: 0.78rem;
    color: var(--text-light);
    font-weight: 400;
    letter-spacing: 0.02em;
  }
  .polish-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    flex-shrink: 0;
  }
  .polish-match {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-light);
    padding: 4px 10px;
    border-radius: 100px;
    white-space: nowrap;
  }
  .buy-link {
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--text-light);
    text-decoration: none;
    padding: 3px 10px;
    border: 1px solid var(--border);
    border-radius: 100px;
    transition: all 0.2s;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .buy-link:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: #FFF9FA;
  }
  .buy-link svg { width: 10px; height: 10px; }

  .no-results {
    text-align: center;
    padding: 32px;
    color: var(--text-light);
    font-style: italic;
  }

  .footer {
    text-align: center;
    margin-top: 56px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    color: var(--text-light);
    font-size: 0.75rem;
    letter-spacing: 0.04em;
    animation: fadeUp 0.8s ease 0.3s both;
  }
</style>
</head>

        </button>
      </div>
      <div class="dropper-hint" id="dropperHint">Tap on the image to pick a color</div>

        <div class="loupe-crosshair"></div>
        <div class="loupe-color" id="loupeColor"></div>
      </div>
    </div>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <div class="loading-section" id="loadingSection">
    <div class="spinner"></div>
    <p>Analyzing your colors…</p>
  </div>

  <div class="extracted-section" id="extractedSection">
    <div class="section-header">
      <div class="section-label">Your colors</div>
      <button class="clear-colors-btn" id="clearColorsBtn">Clear all</button>
    </div>
    <div class="color-chips" id="colorChips"></div>
  </div>

  <div class="results-section" id="resultsSection">
    <div class="section-label" style="margin-bottom:14px">Matching nail polishes</div>
    <div class="polish-grid" id="polishGrid"></div>
  </div>

  <div class="footer">
    Colors extracted from your image · Matched to popular polish shades
  </div>
</div>

  // ═══ BLACKS ═══
  { name: "Black Onyx", brand: "OPI", hex: "#1A1A1A" },
  { name: "Lady in Black", brand: "OPI", hex: "#222222" },
  { name: "Licorice", brand: "Essie", hex: "#1C1C1C" },
  { name: "Black Cherry", brand: "Revlon", hex: "#2A1520" },
  { name: "Liquid Leather", brand: "China Glaze", hex: "#181818" },
  { name: "Raven", brand: "Zoya", hex: "#1A1A1A" },
  { name: "Jet", brand: "Sally Hansen", hex: "#161616" },
  { name: "Liquid Vinyl", brand: "ORLY", hex: "#141414" },
];

// ─── Color math ───
function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function rgbToHex(r,g,b) {
  return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
}
function rgbToLab([r,g,b]) {
  let rr=r/255, gg=g/255, bb=b/255;
  rr = rr>0.04045 ? Math.pow((rr+0.055)/1.055,2.4) : rr/12.92;
  gg = gg>0.04045 ? Math.pow((gg+0.055)/1.055,2.4) : gg/12.92;
  bb = bb>0.04045 ? Math.pow((bb+0.055)/1.055,2.4) : bb/12.92;
  let x=(rr*0.4124564+gg*0.3575761+bb*0.1804375)/0.95047;
  let y=(rr*0.2126729+gg*0.7151522+bb*0.0721750)/1.00000;
  let z=(rr*0.0193339+gg*0.1191920+bb*0.9503041)/1.08883;
  const f=t=>t>0.008856?Math.cbrt(t):(7.787*t)+16/116;
  x=f(x); y=f(y); z=f(z);
  return [116*y-16, 500*(x-y), 200*(y-z)];
}
function deltaE(a,b) {
  return Math.sqrt((a[0]-b[0])**2 + (a[1]-b[1])**2 + (a[2]-b[2])**2);
}

// ─── K-means ───
function extractColors(imageData, k=6) {
  const pixels=[], data=imageData.data;
  const step=Math.max(1, Math.floor(data.length/4/5000));
  for(let i=0;i<data.length;i+=4*step){
    if(data[i+3]<128) continue;
    pixels.push([data[i],data[i+1],data[i+2]]);
  }
  if(pixels.length<k) return pixels;
  let centroids=[pixels[Math.floor(Math.random()*pixels.length)]];
  for(let c=1;c<k;c++){
    const dists=pixels.map(p=>Math.min(...centroids.map(cen=>(p[0]-cen[0])**2+(p[1]-cen[1])**2+(p[2]-cen[2])**2)));
    const total=dists.reduce((a,b)=>a+b,0);
    let r=Math.random()*total;
    for(let i=0;i<dists.length;i++){r-=dists[i]; if(r<=0){centroids.push([...pixels[i]]);break;}}
  }
  for(let iter=0;iter<15;iter++){
    const clusters=Array.from({length:k},()=>[]);
    for(const p of pixels){
      let minD=Infinity,minI=0;
      for(let i=0;i<k;i++){const d=(p[0]-centroids[i][0])**2+(p[1]-centroids[i][1])**2+(p[2]-centroids[i][2])**2;if(d<minD){minD=d;minI=i;}}
      clusters[minI].push(p);
    }
    for(let i=0;i<k;i++){
      if(!clusters[i].length) continue;
      centroids[i]=clusters[i].reduce((a,p)=>[a[0]+p[0],a[1]+p[1],a[2]+p[2]],[0,0,0]).map(v=>Math.round(v/clusters[i].length));
    }
  }
  const sizes=centroids.map(c=>({color:c,count:0}));
  for(const p of pixels){
    let minD=Infinity,minI=0;
    for(let i=0;i<k;i++){const d=(p[0]-centroids[i][0])**2+(p[1]-centroids[i][1])**2+(p[2]-centroids[i][2])**2;if(d<minD){minD=d;minI=i;}}
    sizes[minI].count++;
  }
  sizes.sort((a,b)=>b.count-a.count);
  const unique=[];
  for(const item of sizes){
    const lab=rgbToLab(item.color);
    if(unique.every(u=>deltaE(rgbToLab(u),lab)>15)) unique.push(item.color);
  }
  return unique.slice(0,6);
}

function findMatches(rgb, count=5) {
  const targetLab=rgbToLab(rgb);
  const scored=POLISH_DB.map(p=>({...p, distance:deltaE(targetLab, rgbToLab(hexToRgb(p.hex)))}));
  scored.sort((a,b)=>a.distance-b.distance);
  return scored.slice(0,count).map(p=>({...p, matchPercent:Math.max(0,Math.round(100-p.distance*1.5))}));
}

// ─── State ───
let extractedColors = [];
let activeColorIndex = -1;
let dropperMode = true;
let fullImage = null;

// ─── DOM ───
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const uploadPrompt = document.getElementById('uploadPrompt');
const previewContainer = document.getElementById('previewContainer');
const previewCanvas = document.getElementById('previewCanvas');
const previewCtx = previewCanvas.getContext('2d', { willReadFrequently: true });
const btnAutoDetect = document.getElementById('btnAutoDetect');
const btnDropper = document.getElementById('btnDropper');
const btnChangePhoto = document.getElementById('btnChangePhoto');
const dropperHint = document.getElementById('dropperHint');
const loupe = document.getElementById('loupe');
const loupeCanvas = document.getElementById('loupeCanvas');
const loupeCtx = loupeCanvas.getContext('2d', { willReadFrequently: true });
const loupeColor = document.getElementById('loupeColor');
const loadingSection = document.getElementById('loadingSection');
const extractedSection = document.getElementById('extractedSection');
const colorChips = document.getElementById('colorChips');
const clearColorsBtn = document.getElementById('clearColorsBtn');
const resultsSection = document.getElementById('resultsSection');
const polishGrid = document.getElementById('polishGrid');
const hiddenCanvas = document.getElementById('colorCanvas');
const hiddenCtx = hiddenCanvas.getContext('2d', { willReadFrequently: true });

// ─── Upload ───
uploadZone.addEventListener('click', (e) => {
  if (uploadZone.classList.contains('has-image')) return;
  fileInput.click();
});
uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault(); uploadZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files.length) processFile(fileInput.files[0]); });
btnChangePhoto.addEventListener('click', (e) => { e.stopPropagation(); fileInput.click(); });

// ─── Mode toggle ───
btnAutoDetect.addEventListener('click', (e) => {
  e.stopPropagation();
  dropperMode = false;
  btnDropper.classList.remove('active');
  btnAutoDetect.classList.add('active');
  dropperHint.classList.remove('visible');
  previewCanvas.classList.add('default-cursor');
  if (fullImage) runAutoDetect();
});

btnDropper.addEventListener('click', (e) => {
  e.stopPropagation();
  dropperMode = true;
  btnAutoDetect.classList.remove('active');
  btnDropper.classList.add('active');
  previewCanvas.classList.remove('default-cursor');
  if (fullImage) {
    dropperHint.classList.add('visible');
    setTimeout(() => dropperHint.classList.remove('visible'), 3000);
  }
});

clearColorsBtn.addEventListener('click', () => {
  extractedColors = [];
  activeColorIndex = -1;
  renderColors();
  resultsSection.style.display = 'none';
  extractedSection.style.display = 'none';
});

// ─── Process file ───
function processFile(file) {
  if (!file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      fullImage = img;
      const maxW = uploadZone.clientWidth || 672;
      const maxH = 420;
      const scale = Math.min(maxW / img.width, maxH / img.height, 1);
      previewCanvas.width = Math.round(img.width * scale);
      previewCanvas.height = Math.round(img.height * scale);
      previewCtx.drawImage(img, 0, 0, previewCanvas.width, previewCanvas.height);

      uploadPrompt.style.display = 'none';
      previewContainer.style.display = 'block';
      uploadZone.classList.add('has-image');

      extractedColors = [];
      activeColorIndex = -1;
      extractedSection.style.display = 'none';
      resultsSection.style.display = 'none';
      loadingSection.style.display = 'none';

      if (dropperMode) {
        dropperHint.classList.add('visible');
        setTimeout(() => dropperHint.classList.remove('visible'), 3000);
      } else {
        runAutoDetect();
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function runAutoDetect() {
  loadingSection.style.display = 'block';
  extractedSection.style.display = 'none';
  resultsSection.style.display = 'none';

  const maxDim = 300;
  const scale = Math.min(maxDim / fullImage.width, maxDim / fullImage.height, 1);
  hiddenCanvas.width = Math.round(fullImage.width * scale);
  hiddenCanvas.height = Math.round(fullImage.height * scale);
  hiddenCtx.drawImage(fullImage, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
  const imageData = hiddenCtx.getImageData(0, 0, hiddenCanvas.width, hiddenCanvas.height);

  setTimeout(() => {
    extractedColors = extractColors(imageData, 8);
    activeColorIndex = -1;
    loadingSection.style.display = 'none';
    renderColors();
    if (extractedColors.length > 0) selectColor(0);
  }, 500);
}

// ─── Dropper ───
function getCanvasPos(e) {
  const rect = previewCanvas.getBoundingClientRect();
  // touchend has empty touches but populated changedTouches
  let source;
  if (e.touches && e.touches.length > 0) {
    source = e.touches[0];
  } else if (e.changedTouches && e.changedTouches.length > 0) {
    source = e.changedTouches[0];
  } else {
    source = e;
  }
  const x = (source.clientX - rect.left) * (previewCanvas.width / rect.width);
  const y = (source.clientY - rect.top) * (previewCanvas.height / rect.height);
  return { x: Math.round(x), y: Math.round(y), clientX: source.clientX, clientY: source.clientY };
}

function sampleColor(x, y) {
  // Clamp to canvas bounds
  x = Math.max(0, Math.min(x, previewCanvas.width - 1));
  y = Math.max(0, Math.min(y, previewCanvas.height - 1));
  let rr=0,gg=0,bb=0,count=0;
  for (let dx=-2; dx<=2; dx++) {
    for (let dy=-2; dy<=2; dy++) {
      const px=x+dx, py=y+dy;
      if (px<0||py<0||px>=previewCanvas.width||py>=previewCanvas.height) continue;
      const d = previewCtx.getImageData(px,py,1,1).data;
      rr+=d[0]; gg+=d[1]; bb+=d[2]; count++;
    }
  }
  if (count === 0) return [0, 0, 0];
  return [Math.round(rr/count), Math.round(gg/count), Math.round(bb/count)];
}

function showLoupe(pos, rgb) {
  const loupeSize = 90;
  const zoomRadius = 7;
  const zoomDiameter = zoomRadius * 2 + 1;
  loupeCanvas.width = loupeSize;
  loupeCanvas.height = loupeSize;
  loupeCtx.imageSmoothingEnabled = false;
  loupeCtx.clearRect(0, 0, loupeSize, loupeSize);
  loupeCtx.drawImage(previewCanvas, pos.x - zoomRadius, pos.y - zoomRadius, zoomDiameter, zoomDiameter, 0, 0, loupeSize, loupeSize);

  const containerRect = previewContainer.getBoundingClientRect();
  let lx = pos.clientX - containerRect.left - loupeSize/2;
  let ly = pos.clientY - containerRect.top - loupeSize - 20;
  if (ly < 0) ly = pos.clientY - containerRect.top + 20;
  lx = Math.max(0, Math.min(lx, containerRect.width - loupeSize));

  loupe.style.display = 'block';
  loupe.style.left = lx + 'px';
  loupe.style.top = ly + 'px';
  loupe.style.borderColor = rgbToHex(...rgb);
  loupeColor.textContent = rgbToHex(...rgb).toUpperCase();
}

function hideLoupe() { loupe.style.display = 'none'; }

previewCanvas.addEventListener('mousemove', (e) => {
  if (!dropperMode || !fullImage) return;
  const pos = getCanvasPos(e);
  const rgb = sampleColor(pos.x, pos.y);
  showLoupe(pos, rgb);
});
previewCanvas.addEventListener('mouseleave', hideLoupe);
previewCanvas.addEventListener('click', (e) => {
  if (!dropperMode || !fullImage) return;
  e.stopPropagation();
  const pos = getCanvasPos(e);
  const rgb = sampleColor(pos.x, pos.y);
  addPickedColor(rgb);
  hideLoupe();
  dropperHint.classList.remove('visible');
});

previewCanvas.addEventListener('touchmove', (e) => {
  if (!dropperMode || !fullImage) return;
  e.preventDefault();
  const pos = getCanvasPos(e);
  const rgb = sampleColor(pos.x, pos.y);
  showLoupe(pos, rgb);
}, { passive: false });

previewCanvas.addEventListener('touchend', (e) => {
  if (!dropperMode || !fullImage) return;
  e.preventDefault();
  const pos = getCanvasPos(e);
  if (pos.x >= 0 && pos.y >= 0 && pos.x < previewCanvas.width && pos.y < previewCanvas.height) {
    const rgb = sampleColor(pos.x, pos.y);
    addPickedColor(rgb);
  }
  hideLoupe();
  dropperHint.classList.remove('visible');
}, { passive: false });

// ─── Color management ───
function addPickedColor(rgb) {
  const lab = rgbToLab(rgb);
  const existingIdx = extractedColors.findIndex(c => deltaE(rgbToLab(c), lab) < 10);
  if (existingIdx >= 0) {
    selectColor(existingIdx);
    return;
  }
  extractedColors.push(rgb);
  renderColors(true);
  selectColor(extractedColors.length - 1);
}

function renderColors(lastIsPicked = false) {
  colorChips.innerHTML = '';
  extractedColors.forEach((rgb, i) => {
    const hex = rgbToHex(...rgb);
    const chip = document.createElement('div');
    chip.className = 'color-chip' + (lastIsPicked && i === extractedColors.length - 1 ? ' picked' : '');
    chip.style.backgroundColor = hex;
    chip.innerHTML = `
      <span class="chip-remove" data-index="${i}">&times;</span>
      <span class="hex-tip">${hex.toUpperCase()}</span>
    `;
    chip.addEventListener('click', (e) => {
      if (e.target.classList.contains('chip-remove')) {
        removeColor(parseInt(e.target.dataset.index));
        return;
      }
      selectColor(i);
    });
    colorChips.appendChild(chip);
  });
  extractedSection.style.display = extractedColors.length > 0 ? 'block' : 'none';
}

function removeColor(index) {
  extractedColors.splice(index, 1);
  if (activeColorIndex === index) {
    activeColorIndex = -1;
    resultsSection.style.display = 'none';
  } else if (activeColorIndex > index) {
    activeColorIndex--;
  }
  renderColors();
  if (extractedColors.length === 0) {
    extractedSection.style.display = 'none';
    resultsSection.style.display = 'none';
  } else if (activeColorIndex >= 0) {
    selectColor(activeColorIndex);
  }
}

function selectColor(index) {
  activeColorIndex = index;
  document.querySelectorAll('.color-chip').forEach((c, i) => c.classList.toggle('active', i === index));
  const rgb = extractedColors[index];
  const matches = findMatches(rgb, 5);
  renderMatches(matches);
}

function renderMatches(matches) {
  polishGrid.innerHTML = '';
  if (!matches.length) {
    polishGrid.innerHTML = '<div class="no-results">No close matches found</div>';
  } else {
    matches.forEach(m => {
      const searchQuery = encodeURIComponent(`${m.brand} ${m.name} nail polish`);
      const buyUrl = `https://www.google.com/search?tbm=shop&q=${searchQuery}`;
      const card = document.createElement('div');
      card.className = 'polish-card';
      card.innerHTML = `
        <div class="polish-swatch" style="background-color: ${m.hex}"></div>
        <div class="polish-info">
          <div class="polish-name">${m.name}</div>
          <div class="polish-brand">${m.brand} · ${m.hex.toUpperCase()}</div>
        </div>
        <div class="polish-right">
          <div class="polish-match">${m.matchPercent}%</div>
          <a class="buy-link" href="${buyUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
            Buy <svg viewBox="0 0 10 10" fill="none"><path d="M3 1h6v6M9 1L1 9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </a>
        </div>
      `;
      polishGrid.appendChild(card);
    });
  }
  resultsSection.style.display = 'block';
}
</script>
